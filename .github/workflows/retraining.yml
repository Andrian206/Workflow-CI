name: CI/CD Model Retraining

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  retrain-and-dockerize:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: MLProject

    steps:
      - name: Set up job
        uses: actions/checkout@v4

      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 dagshub pandas scikit-learn matplotlib seaborn

      - name: Run mlflow project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: mlflow run . --env-manager local

      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          RUN_ID=$(ls -1 mlruns/0 | grep -v meta.yaml | head -n 1)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyDrive2

      - name: Upload to Google Drive
        env:
          RUN_ID: ${{ env.RUN_ID }}
        run: |
          curl https://rclone.org/install.sh | sudo bash
          mkdir -p ~/.config/rclone
          echo "${{ secrets.RCLONE_CONFIG_GDRIVE }}" > ~/.config/rclone/rclone.conf
          rclone copy mlruns/ gdrive:mlruns/${RUN_ID} --create-empty-src-dirs --transfers=4

      - name: Build Docker Model
        env:
          RUN_ID: ${{ env.RUN_ID }}
        run: |
          find /opt/hostedtoolcache/Python -name docker_utils.py -exec sed -i 's|https://bootstrap.pypa.io/get-pip.py|https://bootstrap.pypa.io/pip/3.9/get-pip.py|g' {} + || true
          mlflow models build-docker -m "mlruns/0/${RUN_ID}/artifacts/model" -n "${{ secrets.DOCKER_USERNAME }}/workflow-ci:latest"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: |
          docker tag "${{ secrets.DOCKER_USERNAME }}/workflow-ci:latest" "${{ secrets.DOCKER_USERNAME }}/workflow-ci:v1.0"

      - name: Push Docker Image
        run: |
          docker push "${{ secrets.DOCKER_USERNAME }}/workflow-ci:latest"
          docker push "${{ secrets.DOCKER_USERNAME }}/workflow-ci:v1.0"
