name: CI/CD Model Retraining

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  retrain-and-dockerize:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: MLProject

    steps:
      - name: Set up job
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0
          pip install dagshub
          pip install pandas
          pip install scikit-learn
          pip install matplotlib
          pip install seaborn

      - name: Run mlflow project
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USER_NAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          CI: true
        run: |
          mlflow run . --env-manager local

      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          if [ -d "mlruns/0" ]; then
            RUN_ID=$(find mlruns/0 -maxdepth 1 -mindepth 1 -type d | head -n 1 | xargs basename)
            echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
            echo "Found RUN_ID: $RUN_ID"
          else
            echo "RUN_ID=no_local_run" >> $GITHUB_ENV
            echo "No local mlruns directory found"
          fi

      - name: Upload to Google Drive
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-artifact
          path: MLProject/mlruns
          retention-days: 30
          if-no-files-found: warn

      - name: Build Docker Model
        env:
          RUN_ID: ${{ env.RUN_ID }}
        run: |
          find /opt/hostedtoolcache/Python \
            -name docker_utils.py \
            -exec sed -i \
            's|https://bootstrap.pypa.io/get-pip.py|https://bootstrap.pypa.io/pip/3.9/get-pip.py|g' \
            {} + || true

          MODEL_PATH=$(find mlruns -type d -path "*/artifacts/model" | head -n 1)

          echo "MODEL_PATH=$MODEL_PATH"

          mlflow models build-docker \
            -m "$MODEL_PATH" \
            -n "${{ secrets.DOCKER_USERNAME }}/workflow-ci:latest"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: |
          docker tag \
          "${{ secrets.DOCKER_USERNAME }}/workflow-ci:latest" \
          "${{ secrets.DOCKER_USERNAME }}/workflow-ci:v1.0"

      - name: Push Docker Image
        run: |
          docker push "${{ secrets.DOCKER_USERNAME }}/workflow-ci:latest"
          docker push "${{ secrets.DOCKER_USERNAME }}/workflow-ci:v1.0"
